    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a; 
            background-image: radial-gradient(circle at 50% 10%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Poppins', sans-serif;
            padding: 40px 0;
            overflow-x: hidden;
        }

        /* --- Header Section --- */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px; 
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #00f2fe, 0 0 30px #00f2fe;
            animation: flicker 2s infinite alternate;
        }

        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 8px;
            color: #4facfe;
            margin-top: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px #fff, 0 0 20px #00f2fe, 0 0 30px #00f2fe; }
            20%, 24%, 55% { text-shadow: none; }
        }

        /* --- Links Container --- */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s ease-in-out;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* --- Individual Button Glow Effects --- */
        .linkedin { border-left: 5px solid #0077b5; }
        .linkedin:hover { background: rgba(0, 119, 181, 0.15); box-shadow: 0 0 20px rgba(0, 119, 181, 0.6); transform: translateY(-3px); }

        .github { border-left: 5px solid #ffffff; }
        .github:hover { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); transform: translateY(-3px); }

        .insta { border-left: 5px solid #bc1888; }
        .insta:hover { background: rgba(188, 24, 136, 0.15); box-shadow: 0 0 20px rgba(188, 24, 136, 0.6); transform: translateY(-3px); }

        .youtube { border-left: 5px solid #ff0000; }
        .youtube:hover { background: rgba(255, 0, 0, 0.15); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); transform: translateY(-3px); }

        .whatsapp { border-left: 5px solid #25d366; }
        .whatsapp:hover { background: rgba(37, 211, 102, 0.15); box-shadow: 0 0 20px rgba(37, 211, 102, 0.6); transform: translateY(-3px); }

        .projects { border-left: 5px solid #7000ff; }
        .projects:hover { background: rgba(112, 0, 255, 0.15); box-shadow: 0 0 20px rgba(112, 0, 255, 0.6); transform: translateY(-3px); }

        .footer {
            margin-top: 40px;
            font-size: 9px;
            color: #475569;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .main-title { font-size: 26px; }
            .sub-title { font-size: 10px; letter-spacing: 6px; }
        }
    </style>
</head>
